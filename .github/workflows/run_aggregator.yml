name: Aggregator Auto Run

on:
  schedule:
    # 每天北京时间上午 11:00 运行一次 (UTC 3:00)
    - cron: '0 3 * * *' 
  workflow_dispatch: # 支持手动点击运行
  push:
    branches:
      - main
    paths:
      - 'subscribe/config/*.json' # 当配置文件更新时自动运行

jobs:
  execute-aggregator:
    runs-on: ubuntu-latest
    
    env:
      # 核心凭据：请在仓库 Settings -> Secrets -> Actions 中添加这些变量
      PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      # 工作模式：0 为爬取+聚合
      WORKFLOW_MODE: 0
      # 设置上海时区
      TZ: Asia/Shanghai

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/checkout@v4
        with:
          python-version: '3.10' # 项目要求 3.10 或更高

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Aggregator Process
        run: |
          # 使用 -s 指定你的配置文件路径
          # -n 64 使用 64 线程以获得最佳性能
          python subscribe/process.py -s subscribe/config/config.default.json -n 64 -t 10000
